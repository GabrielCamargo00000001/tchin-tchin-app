<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tchin Tchin · Refator UI/UX v1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Geist:wght@400;500;600;700&display=swap"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,0..1,0"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; }
    body, html { margin: 0; padding: 0; background: #fafaf8; font-family: 'Inter', system-ui, sans-serif; color: #0F0F0F; }
    /* Center the phone frame and keep the page itself from scrolling — only the
       app content inside the frame scrolls. */
    #root { height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    button { font-family: inherit; }
    .material-symbols-rounded { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    @keyframes tcSpin { to { transform: rotate(360deg); } }
    @keyframes tcFadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes tcSlideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes tcSlideLeft { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @keyframes tcScan { 0% { top: 8px; } 50% { top: calc(100% - 12px); } 100% { top: 8px; } }
    @keyframes tcScanPulse { 0%, 100% { opacity: 0.3; transform: scaleX(0.85); } 50% { opacity: 1; transform: scaleX(1); } }
    @keyframes tcDrawIn { from { transform: scale(0.6); opacity: 0; transform-origin: center; } to { transform: scale(1); opacity: 1; } }
    @keyframes tcSlideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes tcPushIn { from { transform: translateX(20%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes tcModalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    @keyframes tcLikePop { 0% { transform: scale(1); } 40% { transform: scale(1.25); } 100% { transform: scale(1); } }
    @keyframes tcCountUp { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes tcTabGlow { 0%, 100% { box-shadow: 0 0 0 2px rgba(160,74,85,0.35), 0 0 12px 4px rgba(160,74,85,0.15); } 50% { box-shadow: 0 0 0 4px rgba(160,74,85,0.65), 0 0 18px 8px rgba(160,74,85,0.35); } }
    @keyframes tcSlideDownIn { from { transform: translateY(-120%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes tcSlideUpOut { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-120%); opacity: 0; } }
    @keyframes tcShake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-4px); } 40% { transform: translateX(4px); } 60% { transform: translateX(-3px); } 80% { transform: translateX(3px); } }
    @keyframes tcTourPulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    @keyframes tcPopIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes tcRipple { from { transform: scale(0); opacity: 0.5; } to { transform: scale(2.5); opacity: 0; } }
    @keyframes tcStaggerIn { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes tcBreath { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }
    @keyframes tcShimmerFast { 0% { background-position: -200% 0 } 100% { background-position: 200% 0 } }
    @keyframes tcWiggle { 0%, 100% { transform: rotate(0); } 25% { transform: rotate(-4deg); } 75% { transform: rotate(4deg); } }
    @keyframes tcConfetti0 { 0% { transform: translate(0, 0) rotate(0); opacity: 1; } 100% { transform: translate(40px, 200px) rotate(540deg); opacity: 0; } }
    @keyframes tcConfetti1 { 0% { transform: translate(0, 0) rotate(0); opacity: 1; } 100% { transform: translate(-50px, 220px) rotate(-480deg); opacity: 0; } }
    button:active { filter: brightness(0.96); }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    a { color: inherit; text-decoration: none; }
    input, textarea { font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
